<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Distributor Login | Pred-Logistics</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050c07; --s1: #091410; --s2: #0e1e17; --border: #1e3328; 
    --text: #c8d8cc; --muted: #4d7a5e; --green: #3ddc6e; --green-glow: rgba(61,220,110,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Syne', sans-serif; }
  body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; }
  
  .auth-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: #e8f5ee; text-align: center; margin-bottom: 30px; letter-spacing: 1px;}
  .logo span { color: var(--green); }
  
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: var(--text); outline: none; transition: 0.2s; }
  .form-input:focus { border-color: var(--green); }
  
  .btn { width: 100%; background: var(--green); color: var(--bg); border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 10px;}
  .btn:hover { box-shadow: 0 0 20px var(--green-glow); filter: brightness(1.1); }
  
  .toggle-text { text-align: center; font-size: 12px; color: var(--muted); margin-top: 20px; cursor: pointer; }
  .toggle-text span { color: var(--green); }
  
  .error-msg { color: #f75f5f; font-size: 12px; text-align: center; margin-bottom: 15px; display: none; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="logo">PRED<span>-</span>LOGISTICS</div>
  
  <div id="errorMsg" class="error-msg"></div>

  <form id="loginForm" onsubmit="handleAuth(event, '/login')">
    <div class="form-group">
      <label class="form-label">Distributor Email</label>
      <input type="email" class="form-input" id="loginEmail" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPassword" required>
    </div>
    <button type="submit" class="btn">Secure Login</button>
    <div class="toggle-text" onclick="toggleForms()">New distributor? <span>Register here</span></div>
  </form>

  <form id="registerForm" style="display:none;" onsubmit="handleAuth(event, '/register')">
    <div class="form-group">
      <label class="form-label">Company Name</label>
      <input type="text" class="form-input" id="regCompany" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="regEmail" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="regPassword" required>
    </div>
    <button type="submit" class="btn">Create Account</button>
    <div class="toggle-text" onclick="toggleForms()">Already registered? <span>Login here</span></div>
  </form>
</div>

<script>
  function toggleForms() {
    const lf = document.getElementById('loginForm');
    const rf = document.getElementById('registerForm');
    document.getElementById('errorMsg').style.display = 'none';
    if(lf.style.display === 'none') { lf.style.display = 'block'; rf.style.display = 'none'; } 
    else { lf.style.display = 'none'; rf.style.display = 'block'; }
  }

  async function handleAuth(e, endpoint) {
    e.preventDefault();
    const isLogin = endpoint === '/login';
    const payload = isLogin ? {
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    } : {
      company: document.getElementById('regCompany').value,
      email: document.getElementById('regEmail').value,
      password: document.getElementById('regPassword').value
    };

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      
      if(res.ok) { window.location.href = '/'; } 
      else { 
        document.getElementById('errorMsg').textContent = data.error; 
        document.getElementById('errorMsg').style.display = 'block'; 
      }
    } catch(err) {
      document.getElementById('errorMsg').textContent = 'Server connection failed.';
      document.getElementById('errorMsg').style.display = 'block';
    }
  }
</script>
</body>
</html>
